<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Saya</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        header {
            background: #007bff;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        
        nav {
            background: #0056b3;
            padding: 0.5rem;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 1rem;
        }
        
        main {
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Selamat Datang</h1>
    </header>
    
    <nav>
        <a href="#home">Beranda</a>
        <a href="#about">Tentang</a>
        <a href="#contact">Kontak</a>
    </nav>
    
    <main>
        <section id="home">
            <h2>Beranda</h2>
            <p>Ini adalah website pertama Anda.</p>
        </section>
        
        <section id="about">
            <h2>Tentang</h2>
            <p>Halaman tentang kami.</p>
        </section>
        
        <section id="contact">
            <h2>Kontak</h2>
            <p>Email: info@example.com</p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2024 Website Saya. Semua hak dilindungi.</p>
    </footer>
</body>
</html>
